<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">The Anatomy of an LLM</title>
  <desc id="desc">Social preview image for an interactive visual guide to how language models work.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="0.58" stop-color="#fbf6ea"/>
      <stop offset="1" stop-color="#eef8fa"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#edf7fa"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f7f2e6"/>
    </linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#156a82"/>
      <stop offset="0.48" stop-color="#be185d"/>
      <stop offset="1" stop-color="#1f7a63"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f8f7f2"/>
  <rect x="48" y="40" width="1104" height="550" rx="30" fill="url(#page)" stroke="#d7cbb6" stroke-opacity="0.48" filter="url(#shadow)"/>
  <rect x="84" y="82" width="5" height="466" rx="2.5" fill="url(#rail)" opacity="0.82"/>

  <g transform="translate(118 110)">
    <text x="0" y="0" font-family="IBM Plex Sans, Avenir Next, Segoe UI, sans-serif" font-size="24" letter-spacing="4" fill="#156a82">INTERACTIVE VISUAL GUIDE</text>
    <text x="0" y="88" font-family="Fraunces, Iowan Old Style, Georgia, serif" font-size="78" fill="#0f172a">The Anatomy</text>
    <text x="0" y="172" font-family="Fraunces, Iowan Old Style, Georgia, serif" font-size="78" fill="#0f172a">of an LLM</text>
    <text x="0" y="232" font-family="IBM Plex Sans, Avenir Next, Segoe UI, sans-serif" font-size="28" fill="#3f3f46">How language models work, step by step.</text>
  </g>

  <g transform="translate(118 410)" filter="url(#soft)">
    <rect x="0" y="0" width="648" height="94" rx="19" fill="url(#flow)" stroke="#156a82" stroke-opacity="0.18"/>
    <g font-family="IBM Plex Sans, Avenir Next, Segoe UI, sans-serif">
      <g transform="translate(20 18)">
        <rect width="128" height="58" rx="13" fill="url(#card)" stroke="#156a82" stroke-opacity="0.16"/>
        <text x="16" y="24" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="13" fill="#156a82" font-weight="700">01</text>
        <text x="16" y="47" font-size="23" fill="#0f172a" font-weight="800">Tokens</text>
      </g>
      <text x="170" y="54" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="22" fill="#156a82" opacity="0.72">-&gt;</text>
      <g transform="translate(202 18)">
        <rect width="128" height="58" rx="13" fill="url(#card)" stroke="#5b4f9d" stroke-opacity="0.16"/>
        <text x="16" y="24" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="13" fill="#5b4f9d" font-weight="700">02</text>
        <text x="16" y="47" font-size="23" fill="#0f172a" font-weight="800">Vectors</text>
      </g>
      <text x="352" y="54" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="22" fill="#5b4f9d" opacity="0.72">-&gt;</text>
      <g transform="translate(384 18)">
        <rect width="244" height="58" rx="13" fill="url(#card)" stroke="#1f7a63" stroke-opacity="0.16"/>
        <text x="16" y="24" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="13" fill="#1f7a63" font-weight="700">03</text>
        <text x="16" y="47" font-size="23" fill="#0f172a" font-weight="800">Attention to output</text>
      </g>
    </g>
  </g>

  <g transform="translate(782 108)" filter="url(#soft)">
    <rect x="0" y="0" width="300" height="378" rx="24" fill="rgba(255,255,255,0.66)" stroke="#156a82" stroke-opacity="0.18"/>
    <text x="26" y="42" font-family="IBM Plex Sans, Avenir Next, Segoe UI, sans-serif" font-size="18" letter-spacing="2" fill="#156a82" font-weight="700">DECODER BLOCK</text>

    <g transform="translate(28 70)">
      <rect x="0" y="0" width="244" height="58" rx="13" fill="#ffffff" stroke="#156a82" stroke-opacity="0.18"/>
      <circle cx="34" cy="29" r="12" fill="#e8f6f9" stroke="#156a82" stroke-opacity="0.24"/>
      <circle cx="74" cy="29" r="12" fill="#f8edf3" stroke="#be185d" stroke-opacity="0.2"/>
      <circle cx="114" cy="29" r="12" fill="#eef8f5" stroke="#1f7a63" stroke-opacity="0.22"/>
      <text x="154" y="35" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="16" fill="#334155">x + position</text>
    </g>

    <g transform="translate(28 156)">
      <rect x="0" y="0" width="112" height="112" rx="14" fill="#ffffff" stroke="#156a82" stroke-opacity="0.16"/>
      <g>
        <rect x="16" y="16" width="18" height="18" rx="4" fill="#156a82" opacity="0.22"/>
        <rect x="38" y="16" width="18" height="18" rx="4" fill="#156a82" opacity="0.48"/>
        <rect x="60" y="16" width="18" height="18" rx="4" fill="#156a82" opacity="0.18"/>
        <rect x="82" y="16" width="18" height="18" rx="4" fill="#156a82" opacity="0.34"/>
        <rect x="16" y="38" width="18" height="18" rx="4" fill="#be185d" opacity="0.16"/>
        <rect x="38" y="38" width="18" height="18" rx="4" fill="#be185d" opacity="0.56"/>
        <rect x="60" y="38" width="18" height="18" rx="4" fill="#be185d" opacity="0.36"/>
        <rect x="82" y="38" width="18" height="18" rx="4" fill="#be185d" opacity="0.2"/>
        <rect x="16" y="60" width="18" height="18" rx="4" fill="#1f7a63" opacity="0.32"/>
        <rect x="38" y="60" width="18" height="18" rx="4" fill="#1f7a63" opacity="0.22"/>
        <rect x="60" y="60" width="18" height="18" rx="4" fill="#1f7a63" opacity="0.62"/>
        <rect x="82" y="60" width="18" height="18" rx="4" fill="#1f7a63" opacity="0.26"/>
        <rect x="16" y="82" width="18" height="18" rx="4" fill="#f59e0b" opacity="0.2"/>
        <rect x="38" y="82" width="18" height="18" rx="4" fill="#f59e0b" opacity="0.26"/>
        <rect x="60" y="82" width="18" height="18" rx="4" fill="#f59e0b" opacity="0.44"/>
        <rect x="82" y="82" width="18" height="18" rx="4" fill="#f59e0b" opacity="0.64"/>
      </g>
    </g>

    <g transform="translate(170 150)" fill="none" stroke-linecap="round" stroke-width="4">
      <path d="M6 32 C46 -6 82 68 120 29" stroke="#156a82" opacity="0.72"/>
      <path d="M6 76 C46 38 82 112 120 73" stroke="#be185d" opacity="0.62"/>
      <path d="M6 120 C46 82 82 156 120 117" stroke="#1f7a63" opacity="0.68"/>
    </g>
    <g transform="translate(160 151)" fill="#fffdf8" stroke-width="2.2">
      <circle cx="16" cy="31" r="15" stroke="#156a82" stroke-opacity="0.3"/>
      <circle cx="136" cy="28" r="15" stroke="#156a82" stroke-opacity="0.3"/>
      <circle cx="16" cy="75" r="15" stroke="#be185d" stroke-opacity="0.3"/>
      <circle cx="136" cy="72" r="15" stroke="#be185d" stroke-opacity="0.3"/>
      <circle cx="16" cy="119" r="15" stroke="#1f7a63" stroke-opacity="0.3"/>
      <circle cx="136" cy="116" r="15" stroke="#1f7a63" stroke-opacity="0.3"/>
    </g>

    <g transform="translate(28 306)">
      <rect x="0" y="0" width="244" height="48" rx="13" fill="#ffffff" stroke="#1f7a63" stroke-opacity="0.17"/>
      <text x="18" y="30" font-family="IBM Plex Mono, SFMono-Regular, Menlo, monospace" font-size="15" fill="#334155">logits -> probabilities</text>
    </g>
  </g>
</svg>
